name: Weekly Backtest

on:
  schedule:
    - cron: "17 4 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: weekly-backtest
  cancel-in-progress: true

jobs:
  backtest:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: python -m pip install -e ".[dev]"
      - run: APP_MODE=production python -m sol_reality_check backtest
        env:
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL }}
      - run: python -m sol_reality_check validate
      - run: pytest -q
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/curated data/ledger site/data
          git diff --cached --quiet || git commit -m "data: refresh SOL Reality Check backtest [skip ci]"
          git push
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4

