name: CI

on:
  pull_request:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/**"
      - "tests/**"
      - "config/**"
      - "schemas/**"
      - "site/**"
      - ".github/workflows/**"
      - "pyproject.toml"
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: python -m pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy
      - run: APP_MODE=demo python -m sol_reality_check bootstrap
      - run: pytest
      - run: python -m sol_reality_check validate
      - run: python -m sol_reality_check ledger-check
      - run: python scripts/build_site.py
      - run: python scripts/smoke_test.py
      - run: '! grep -R "COINGECKO_API_KEY=.*[A-Za-z0-9]" -n . --exclude-dir=.git --exclude-dir=.github'
