name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "src/**"
      - "config/**"
      - "scripts/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: python -m pip install -e ".[dev]"
      - run: python -c "import json; d=json.load(open('site/data/dashboard.json')); assert d['mode'] == 'production' and d.get('demo_notice') is None, d"
      - run: python scripts/build_site.py
      - run: python scripts/prepare_pages_artifact.py --site-dir site --out-dir .pages-artifact --git-sha "${GITHUB_SHA}" --branch "${GITHUB_REF_NAME}"
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .pages-artifact
      - id: deployment
        uses: actions/deploy-pages@v4
      - name: Verify live Pages deployment
        run: |
          python scripts/check_pages_sync.py \
            --site-dir site \
            --base-url "https://jwblank.github.io/solana-dashboard/" \
            --expected-sha "${GITHUB_SHA}" \
            --branch "${GITHUB_REF_NAME}" \
            --retries 10 \
            --sleep-seconds 10
          curl -fsSL "https://jwblank.github.io/solana-dashboard/?verify=${GITHUB_SHA}" | grep 'data-tab="actueel"'
          curl -fsSL "https://jwblank.github.io/solana-dashboard/?verify=${GITHUB_SHA}" | grep 'data-subtab="analyse-prijs"'
          curl -fsSL "https://jwblank.github.io/solana-dashboard/?verify=${GITHUB_SHA}" | grep 'data-subtab="bewijs-data"'
          curl -fsSL "https://jwblank.github.io/solana-dashboard/data/overview.json?verify=${GITHUB_SHA}" >/dev/null
          curl -fsSL "https://jwblank.github.io/solana-dashboard/data/overview_history.json?verify=${GITHUB_SHA}" >/dev/null
