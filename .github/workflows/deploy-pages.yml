name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "src/**"
      - "config/**"
      - "scripts/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: python -m pip install -e ".[dev]"
      - run: APP_MODE=production python -m sol_reality_check update
        env:
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL }}
      - run: python -m sol_reality_check validate
      - run: python -m sol_reality_check ledger-check
      - run: pytest -q
      - run: python scripts/build_site.py
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
